services:
  blog:
    image: ghcr.io/finn7x/finn-days:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finn-days-blog
    ports:
      - "${BLOG_PORT:-8200}:8200"
    environment:
      - NODE_ENV=production
      - PORT=8200
      - UMAMI_URL=${NEXT_PUBLIC_UMAMI_URL:-http://umami:3000}
      - UMAMI_ID=${NEXT_PUBLIC_UMAMI_ID}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    restart: unless-stopped
    networks:
      - finn-days-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: finn-days-umami
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
      - DISABLE_TELEMETRY=1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - finn-days-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: finn-days-db
    volumes:
      - umami-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - finn-days-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  finn-days-network:
    driver: bridge

volumes:
  umami-data:
