<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #161412; }
    .fg { fill: #faf9f7; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #faf9f7; }
      .fg { fill: #161412; }
    }
  </style>

  <!-- Squircle container -->
  <rect class="bg" width="32" height="32" rx="7"/>

  <!-- Italic serif "f" — Finn Days brand mark -->
  <g transform="translate(16, 16) rotate(2) translate(-16, -16)">
    <!-- Stem -->
    <rect class="fg" x="14" y="10" width="3.2" height="16" rx="1"/>
    <!-- Top hook -->
    <path class="fg" d="M17.2 10 C17.2 7.5 18.5 6.5 20.5 6.5 C21 6.5 21.5 6.6 21.8 6.8 L21 9 C20.7 8.8 20.3 8.7 20 8.7 C19 8.7 18.2 9.2 17.8 10 Z"/>
    <!-- Crossbar -->
    <rect class="fg" x="10" y="15.5" width="12" height="2.8" rx="1"/>
  </g>
</svg>
