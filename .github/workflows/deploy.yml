name: Deploy

on:
  push:
    tags: ['v*']

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: finn7x/finn-dsys

permissions:
  contents: read
  packages: write

jobs:
  # ────────────────────────────────────────────
  # Job 1: Lint, Type-check & Build validation
  # ────────────────────────────────────────────
  check:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Velite content types
        run: npx velite

      - name: Type-check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────
  # Job 2: Build Docker image & push to GHCR
  # ────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────
  # Job 3: Deploy to server via SSH
  # ────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /home/finn-dsys

            # Pull the latest blog image from GHCR
            docker compose pull blog

            # Recreate only the blog service (no local build)
            docker compose up -d blog --force-recreate --no-build

            # Clean up dangling images
            docker image prune -f

            # Health check — wait up to 60s
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              if wget -q --spider http://127.0.0.1:7900 2>/dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              echo "  Attempt $i/12 — retrying in 5s..."
              sleep 5
            done

            echo "Health check failed after 60s"
            exit 1
