# Pagefind configuration
site: .next/server/app
output_path: public/_pagefind

# CJK Chinese support
force_language: zh-CN

# Exclude non-content elements from indexing
exclude_selectors:
  - "nav"
  - "footer"
  - ".no-search"
  - "#comments"

# Search ranking configuration
ranking:
  page_length: 0.5
  term_frequency: 1.5
  term_similarity: 1.0
